name: Build

on:
  pull_request:
  push:
    branches:
      - '**'
    paths-ignore:
      - '**/*.md'

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Free up disk space in runner
      uses: ./.github/actions/disk-cleanup

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        cache-read-only: true

    - name: Build Docker image
      run: docker build -f Dockerfile.android -t ringrtc-builder .

    - name: Build library inside Docker
      run: |
        mkdir -p "$RUNNER_TEMP/m2-repository"
        docker run --rm \
          -v "$HOME/.gradle/caches:/.gradle-ro-cache:ro" \
          -v "$RUNNER_TEMP/m2-repository:/root/.m2/repository" \
          ringrtc-builder install

    - name: Export Maven repo
      uses: actions/upload-artifact@v7
      with:
        name: ringrtc-maven-local
        path: "${{ runner.temp }}/m2-repository"
        if-no-files-found: error
