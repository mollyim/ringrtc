name: Build

on:
  push:
    branches:
      - 'main'
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v6

    - name: Free up disk space in runner
      uses: ./.github/actions/disk-cleanup

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: 21

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6
      with:
        cache-read-only: true

    - name: Build Docker image
      run: docker build -f Dockerfile.android -t ringrtc-builder .

    - name: Compile library inside Docker
      run: |
        mkdir -p "$RUNNER_TEMP/m2-repository"
        docker run --rm \
          -v "$HOME/.gradle/caches:/.gradle-ro-cache:ro" \
          -v "$RUNNER_TEMP/m2-repository:/root/.m2/repository" \
          ringrtc-builder assemble

    - name: Export Maven repository
      uses: actions/upload-artifact@v7
      with:
        name: ringrtc-maven-local
        path: "${{ runner.temp }}/m2-repository"
        if-no-files-found: error
